@if (authService.isAuthenticated()) {
  <nav class="nav-container">
    <a routerLink="/" class="brand">Micro <span>ATS</span></a>
    <div class="nav-links">
      <a routerLink="/admin/requisitions" class="flex items-center gap-2">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">assignment</mat-icon>
        Requisitions
      </a>
      <a routerLink="/admin/jobs" class="flex items-center gap-2">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">work</mat-icon>
        Jobs
      </a>
      <a routerLink="/admin/candidates" class="flex items-center gap-2">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">people</mat-icon>
        Candidates
      </a>
      <a routerLink="/admin/applications" class="flex items-center gap-2">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">view_kanban</mat-icon>
        Applications
      </a>
      
      <!-- User Profile Dropdown -->
      <div class="ml-4 flex items-center">
        <button 
          [matMenuTriggerFor]="userMenu"
          class="flex items-center gap-3 py-1 px-2 hover:bg-white/5 rounded-full transition-all border border-transparent hover:border-honeycomb-500/30">
          <div class="w-8 h-8 rounded-full bg-honeycomb-500 flex items-center justify-center text-[10px] font-black text-black uppercase border border-honeycomb-400 shrink-0">
            @if (authService.user(); as user) {
              @if (user.photoUrl) {
                <img [src]="user.photoUrl" class="w-full h-full rounded-full object-cover">
              } @else {
                {{ user.fullName.charAt(0) }}
              }
            }
          </div>
          <span class="text-sm font-bold text-slate-200 hidden md:block">
            {{ authService.user()?.fullName?.split(' ')?.at(0) }}
          </span>
          <mat-icon class="text-slate-500 !text-[18px] !w-[18px] !h-[18px]">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="before" class="!rounded-xl !border !border-slate-200 !shadow-xl">
          <div class="px-4 py-3 border-b border-slate-50 mb-1 bg-surface-alt/50">
            <div class="text-xs font-bold text-ink truncate">{{ authService.user()?.fullName }}</div>
            <div class="flex items-center gap-2 mt-1">
              <span class="text-[9px] font-black text-honeycomb-600 uppercase tracking-tighter border border-honeycomb-200 bg-honeycomb-50 px-1.5 rounded">Administrator</span>
              <span class="text-[10px] font-medium text-slate-400 truncate max-w-[100px]">{{ authService.user()?.email }}</span>
            </div>
          </div>
          
          <a mat-menu-item routerLink="/admin/profile">
            <mat-icon>person</mat-icon>
            <span class="text-xs font-bold">My Profile</span>
          </a>
          
          <button mat-menu-item>
            <mat-icon>settings</mat-icon>
            <span class="text-xs font-bold">Settings</span>
          </button>
          
          <mat-divider></mat-divider>
          
          <button mat-menu-item (click)="logout()" class="!text-red-500">
            <mat-icon class="!text-red-500">logout</mat-icon>
            <span class="text-xs font-bold">Logout</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </nav>
}

<main>
  <router-outlet />
</main>
