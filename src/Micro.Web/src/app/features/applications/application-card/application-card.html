<div class="card-honeycomb cursor-grab active:cursor-grabbing mb-4 group relative overflow-hidden">
  <!-- Accent Stripe for High Priority/Active state can be added here if needed -->
  <div class="absolute left-0 top-0 bottom-0 w-1 bg-honeycomb-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
  
  <div class="flex flex-col gap-1.5">
    <div class="text-ink font-bold text-lg group-hover:text-honeycomb-600 transition-colors tracking-tight candidate-name">
      {{ application.candidateName }}
    </div>
    <div class="text-xs text-ink-light font-semibold uppercase tracking-wider opacity-70 job-title">
      {{ application.jobTitle }}
    </div>
    <div class="flex items-center gap-2 mt-3">
      <div class="badge-status bg-slate-100 text-slate-600">Applied</div>
      <div class="text-[10px] font-bold text-slate-400">
        {{ application.appliedAt | date:'MMM d, yyyy' }}
      </div>
    </div>
  </div>
  
  <div class="mt-5 pt-4 border-t border-slate-100 flex justify-between items-center">
    <div class="flex -space-x-2">
      <!-- Placeholder for candidate initials/avatar -->
      <div class="w-6 h-6 rounded-full bg-honeycomb-100 border-2 border-white flex items-center justify-center text-[10px] font-bold text-honeycomb-700">
        {{ application.candidateName.charAt(0) }}
      </div>
    </div>
    <a [routerLink]="['/admin/candidates', application.candidateId]" 
       class="text-[11px] font-bold text-honeycomb-600 hover:text-honeycomb-700 transition-colors flex items-center gap-1 no-underline uppercase tracking-widest">
      Profile <mat-icon class="!text-[14px] !w-[14px] !h-[14px]">arrow_forward</mat-icon>
    </a>
  </div>
</div>
